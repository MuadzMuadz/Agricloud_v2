; PHP production tuning untuk AgriCloud di Render.
memory_limit = 256M
upload_max_filesize = 20M
post_max_size = 20M
max_execution_time = 60
expose_php = Off

opcache.enable = 1
opcache.enable_cli = 0
; 64MB cukup untuk Laravel; hemat RAM di box 512MB.
opcache.memory_consumption = 64
opcache.max_accelerated_files = 10000
opcache.validate_timestamps = 0
