; Pool php-fpm di-tune untuk Render free (512 MB RAM, 0.1 CPU).
; Override default www.conf — batasi jumlah worker biar tidak OOM.
[www]
user = www-data
group = www-data
listen = 127.0.0.1:9000

; ondemand: worker baru dibuat saat ada request, mati saat idle → hemat RAM.
pm = ondemand
pm.max_children = 6
pm.process_idle_timeout = 10s
pm.max_requests = 500

; Wajib: agar env var yang di-inject Render (DB_URL, dst) sampai ke PHP.
clear_env = no

; Log worker ke stdout/stderr (kelihatan di Render Logs).
catch_workers_output = yes
decorate_workers_output = no
